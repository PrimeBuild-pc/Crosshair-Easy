name: crosshair_studio
description: A desktop application for creating, customizing, and exporting gaming crosshairs.
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  shared_preferences: ^2.1.1
  path_provider: ^2.0.15
  uuid: ^3.0.7
  intl: ^0.18.1
  ffi: ^2.0.2
  path: ^1.8.3
  flutter_colorpicker: ^1.0.3
  url_launcher: ^6.1.11
  window_manager: ^0.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/transparent_bg.svg