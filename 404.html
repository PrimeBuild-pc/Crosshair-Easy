<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    
    .container {
      max-width: 600px;
      padding: 40px;
    }
    
    h1 {
      font-size: 48px;
      color: #FF9800;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 18px;
      margin-bottom: 32px;
    }
    
    a {
      color: #FF9800;
      text-decoration: none;
      font-weight: bold;
    }
    
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you're looking for cannot be found.</p>
    <a href="/">Return to Home</a>
  </div>
</body>
</html>
