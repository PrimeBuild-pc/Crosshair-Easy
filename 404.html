<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Crosshair Studio</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
      color: #e1e1e1;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    
    h1 {
      font-size: 8rem;
      margin: 0;
      background: linear-gradient(90deg, #FF6B00, #FF8B00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    h2 {
      font-size: 2rem;
      color: #e1e1e1;
      margin-top: 0;
    }
    
    p {
      font-size: 1.2rem;
      color: #999;
      margin-bottom: 2rem;
    }
    
    .back-btn {
      display: inline-block;
      background: linear-gradient(90deg, #FF6B00, #FF8B00);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(255, 107, 0, 0.3);
    }
    
    .crosshair {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 30px auto;
    }
    
    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background-color: #FF6B00;
      animation: pulse 1.5s infinite;
    }
    
    .crosshair::before {
      width: 4px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .crosshair::after {
      width: 100%;
      height: 4px;
      top: 50%;
      transform: translateY(-50%);
    }
    
    .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #FF6B00;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Target Not Found</h2>
    <div class="crosshair">
      <div class="center-dot"></div>
    </div>
    <p>The page you're looking for is out of range.</p>
    <a href="/" class="back-btn">Return to Home</a>
  </div>
</body>
</html>
